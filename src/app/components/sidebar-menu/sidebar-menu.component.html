<div class="flex flex-col gap-2">
  @for (item of menuItems; let i = $index; track i) {
    <a
      [href]="item.route"
      [class]="item.icon"
      class="text-white hover:text-primary transition flex items-center gap-4 p-2 hover:bg-dark-hover rounded-xs"
    >
      @if (item.icon === 'home') {
        <div class="w-5">
          <app-home-icon />
        </div>
      } @else if (item.icon === 'chat') {
        <div class="w-4">
          <app-chat-icon />
        </div>
      } @else {
        <div class="w-4">
          <app-search-icon />
        </div>
      }
      <span class="text-sm font-bold">{{ item.title }}</span>
    </a>
  }
</div>
